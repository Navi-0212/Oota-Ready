version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://zomato_user:zomato_pass@postgres:5432/zomato
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    env_file:
      - backend/.env
    networks:
      - zomato-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - zomato-network

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: zomato
      POSTGRES_USER: zomato_user
      POSTGRES_PASSWORD: zomato_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - zomato-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - zomato-network

volumes:
  postgres-data:
  redis-data:

networks:
  zomato-network:
    driver: bridge
